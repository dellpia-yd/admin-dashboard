<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState } = React;

// ----------------------------------------------------------------------------
// 샘플 데이터 (실제 서비스에서는 API/DB에서 불러오면 됩니다)
// ----------------------------------------------------------------------------
const initialUsers = [
  { id: 1, name: "김민준", email: "minjun.kim@example.com", role: "관리자", status: "활성", joined: "2024-01-12" },
  { id: 2, name: "이서연", email: "seoyeon.lee@example.com", role: "일반", status: "활성", joined: "2024-03-02" },
  { id: 3, name: "박도윤", email: "doyun.park@example.com", role: "일반", status: "정지", joined: "2024-05-20" },
  { id: 4, name: "최지우", email: "jiwoo.choi@example.com", role: "일반", status: "활성", joined: "2024-06-15" },
  { id: 5, name: "정하은", email: "haeun.jung@example.com", role: "매니저", status: "활성", joined: "2024-08-09" },
];

const navItems = [
  { id: "dashboard", label: "대시보드", icon: "▦" },
  { id: "users", label: "회원 관리", icon: "👤" },
  { id: "products", label: "상품 관리", icon: "📦" },
  { id: "posts", label: "게시글 관리", icon: "📝" },
  { id: "settings", label: "설정", icon: "⚙️" },
];

const statCards = [
  { label: "전체 회원", value: "12,480", delta: "+128 (이번 주)", accent: "bg-indigo-500" },
  { label: "활성 상품", value: "326", delta: "+12 (이번 주)", accent: "bg-emerald-500" },
  { label: "게시글", value: "1,902", delta: "+34 (이번 주)", accent: "bg-amber-500" },
  { label: "오늘 매출", value: "₩4,820,000", delta: "+8.2%", accent: "bg-rose-500" },
];

// ----------------------------------------------------------------------------
// 회원 추가/수정 모달
// ----------------------------------------------------------------------------
function UserModal({ user, onClose, onSave }) {
  const [form, setForm] = useState(
    user ?? { name: "", email: "", role: "일반", status: "활성", joined: new Date().toISOString().slice(0, 10) }
  );

  const handleChange = (key) => (e) => setForm((f) => ({ ...f, [key]: e.target.value }));

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
      <div className="w-full max-w-md rounded-2xl bg-white shadow-xl">
        <div className="flex items-center justify-between border-b border-slate-100 px-6 py-4">
          <h3 className="text-base font-semibold text-slate-800">
            {user ? "회원 정보 수정" : "회원 추가"}
          </h3>
          <button onClick={onClose} className="rounded-lg p-1 text-slate-400 hover:bg-slate-100 hover:text-slate-600">
            ✕
          </button>
        </div>

        <div className="space-y-4 px-6 py-5">
          <div>
            <label className="mb-1 block text-xs font-medium text-slate-500">이름</label>
            <input
              value={form.name}
              onChange={handleChange("name")}
              className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
              placeholder="홍길동"
            />
          </div>
          <div>
            <label className="mb-1 block text-xs font-medium text-slate-500">이메일</label>
            <input
              value={form.email}
              onChange={handleChange("email")}
              className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
              placeholder="email@example.com"
            />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="mb-1 block text-xs font-medium text-slate-500">역할</label>
              <select
                value={form.role}
                onChange={handleChange("role")}
                className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
              >
                <option>관리자</option>
                <option>매니저</option>
                <option>일반</option>
              </select>
            </div>
            <div>
              <label className="mb-1 block text-xs font-medium text-slate-500">상태</label>
              <select
                value={form.status}
                onChange={handleChange("status")}
                className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
              >
                <option>활성</option>
                <option>정지</option>
              </select>
            </div>
          </div>
        </div>

        <div className="flex justify-end gap-2 border-t border-slate-100 px-6 py-4">
          <button
            onClick={onClose}
            className="rounded-lg px-4 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100"
          >
            취소
          </button>
          <button
            onClick={() => onSave(form)}
            className="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700"
          >
            저장
          </button>
        </div>
      </div>
    </div>
  );
}

function PlaceholderSection({ title }) {
  return (
    <div className="flex flex-col items-center justify-center rounded-2xl bg-white py-24 text-center shadow-sm ring-1 ring-slate-100">
      <div className="mb-3 flex h-12 w-12 items-center justify-center rounded-full bg-slate-100 text-slate-400 text-xl">
        ⌄
      </div>
      <p className="text-sm font-medium text-slate-600">{title} 페이지는 아직 준비 중이에요</p>
      <p className="mt-1 text-xs text-slate-400">"회원 관리"와 같은 구조로 만들어 달라고 요청해보세요.</p>
    </div>
  );
}

// ----------------------------------------------------------------------------
// 메인 앱
// ----------------------------------------------------------------------------
function AdminDashboard() {
  const [activeNav, setActiveNav] = useState("dashboard");
  const [users, setUsers] = useState(initialUsers);
  const [search, setSearch] = useState("");
  const [modalUser, setModalUser] = useState(null); // null = closed, {} = 추가, user = 수정
  const [openMenuId, setOpenMenuId] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const filteredUsers = users.filter(
    (u) =>
      u.name.toLowerCase().includes(search.toLowerCase()) ||
      u.email.toLowerCase().includes(search.toLowerCase())
  );

  const handleSaveUser = (form) => {
    if (form.id) {
      setUsers((prev) => prev.map((u) => (u.id === form.id ? form : u)));
    } else {
      setUsers((prev) => [...prev, { ...form, id: Math.max(0, ...prev.map((u) => u.id)) + 1 }]);
    }
    setModalUser(null);
  };

  const handleDeleteUser = (id) => {
    setUsers((prev) => prev.filter((u) => u.id !== id));
    setOpenMenuId(null);
  };

  return (
    <div className="flex h-screen w-full bg-slate-50 text-slate-800">
      {/* 사이드바 */}
      <aside className={`fixed inset-y-0 left-0 z-40 flex w-60 shrink-0 flex-col border-r border-slate-200 bg-white transition-transform md:relative md:translate-x-0 ${sidebarOpen ? "translate-x-0" : "-translate-x-full"}`}>
        <div className="flex items-center gap-2 px-6 py-5">
          <div className="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 text-sm font-bold text-white">
            A
          </div>
          <span className="text-lg font-bold text-slate-800">Admin</span>
        </div>

        <nav className="mt-2 flex-1 space-y-1 px-3">
          {navItems.map((item) => {
            const isActive = activeNav === item.id;
            return (
              <button
                key={item.id}
                onClick={() => { setActiveNav(item.id); setSidebarOpen(false); }}
                className={`flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition-colors ${
                  isActive
                    ? "bg-indigo-50 text-indigo-600"
                    : "text-slate-500 hover:bg-slate-50 hover:text-slate-700"
                }`}
              >
                <span className="text-base">{item.icon}</span>
                {item.label}
              </button>
            );
          })}
        </nav>

        <div className="border-t border-slate-100 px-4 py-4">
          <div className="flex items-center gap-3 rounded-xl bg-slate-50 px-3 py-2.5">
            <div className="flex h-9 w-9 items-center justify-center rounded-full bg-slate-200 text-sm font-semibold text-slate-600">
              관
            </div>
            <div className="leading-tight">
              <p className="text-sm font-semibold text-slate-700">관리자</p>
              <p className="text-xs text-slate-400">admin@example.com</p>
            </div>
          </div>
        </div>
      </aside>

      {sidebarOpen && (
        <div onClick={() => setSidebarOpen(false)} className="fixed inset-0 z-30 bg-black/30 md:hidden" />
      )}

      {/* 메인 영역 */}
      <main className="flex-1 overflow-y-auto">
        <header className="flex items-center justify-between border-b border-slate-200 bg-white px-4 py-4 md:px-8">
          <div className="flex items-center gap-3">
            <button onClick={() => setSidebarOpen(true)} className="rounded-lg p-1.5 text-slate-500 hover:bg-slate-100 md:hidden">
              ☰
            </button>
            <h1 className="text-xl font-bold text-slate-800">
              {navItems.find((n) => n.id === activeNav)?.label}
            </h1>
          </div>
          <div className="relative hidden sm:block">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
            <input
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="검색..."
              className="w-64 rounded-lg border border-slate-200 bg-slate-50 px-9 py-2 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
            />
          </div>
        </header>

        <div className="p-4 md:p-8">
          {activeNav === "dashboard" && (
            <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
              {statCards.map((card) => (
                <div key={card.label} className="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-100">
                  <div className={`mb-3 h-1.5 w-10 rounded-full ${card.accent}`} />
                  <p className="text-sm text-slate-400">{card.label}</p>
                  <p className="mt-1 text-2xl font-bold text-slate-800">{card.value}</p>
                  <p className="mt-1 text-xs font-medium text-emerald-500">{card.delta}</p>
                </div>
              ))}

              <div className="col-span-full mt-2 rounded-2xl bg-white p-6 text-sm text-slate-400 shadow-sm ring-1 ring-slate-100">
                여기에 차트, 최근 활동 로그, 알림 등을 추가할 수 있어요. 왼쪽 메뉴에서 "회원 관리"를
                눌러 실제 데이터 테이블 예시를 확인해보세요.
              </div>
            </div>
          )}

          {activeNav === "users" && (
            <div className="rounded-2xl bg-white shadow-sm ring-1 ring-slate-100">
              <div className="flex flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-6">
                <div className="relative sm:hidden">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                  <input
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    placeholder="검색..."
                    className="w-full rounded-lg border border-slate-200 bg-slate-50 px-9 py-2 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
                  />
                </div>
                <p className="text-sm text-slate-400">총 {filteredUsers.length}명</p>
                <button
                  onClick={() => setModalUser({})}
                  className="flex items-center justify-center gap-1.5 rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white hover:bg-indigo-700"
                >
                  + 회원 추가
                </button>
              </div>

              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm">
                  <thead>
                    <tr className="border-y border-slate-100 text-xs uppercase tracking-wide text-slate-400">
                      <th className="px-6 py-3 font-medium">이름</th>
                      <th className="px-6 py-3 font-medium">이메일</th>
                      <th className="px-6 py-3 font-medium">역할</th>
                      <th className="px-6 py-3 font-medium">상태</th>
                      <th className="px-6 py-3 font-medium">가입일</th>
                      <th className="px-6 py-3 font-medium text-right">관리</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredUsers.map((u) => (
                      <tr key={u.id} className="border-b border-slate-50 last:border-0 hover:bg-slate-50/60">
                        <td className="px-6 py-3 font-medium text-slate-700">{u.name}</td>
                        <td className="px-6 py-3 text-slate-500">{u.email}</td>
                        <td className="px-6 py-3 text-slate-500">{u.role}</td>
                        <td className="px-6 py-3">
                          <span
                            className={`rounded-full px-2.5 py-1 text-xs font-medium ${
                              u.status === "활성"
                                ? "bg-emerald-50 text-emerald-600"
                                : "bg-rose-50 text-rose-500"
                            }`}
                          >
                            {u.status}
                          </span>
                        </td>
                        <td className="px-6 py-3 text-slate-500">{u.joined}</td>
                        <td className="relative px-6 py-3 text-right">
                          <button
                            onClick={() => setOpenMenuId(openMenuId === u.id ? null : u.id)}
                            className="rounded-lg p-1.5 text-slate-400 hover:bg-slate-100"
                          >
                            ⋮
                          </button>
                          {openMenuId === u.id && (
                            <div className="absolute right-6 top-10 z-10 w-32 rounded-xl border border-slate-100 bg-white py-1 shadow-lg">
                              <button
                                onClick={() => {
                                  setModalUser(u);
                                  setOpenMenuId(null);
                                }}
                                className="block w-full px-4 py-2 text-left text-sm text-slate-600 hover:bg-slate-50"
                              >
                                수정
                              </button>
                              <button
                                onClick={() => handleDeleteUser(u.id)}
                                className="block w-full px-4 py-2 text-left text-sm text-rose-500 hover:bg-rose-50"
                              >
                                삭제
                              </button>
                            </div>
                          )}
                        </td>
                      </tr>
                    ))}
                    {filteredUsers.length === 0 && (
                      <tr>
                        <td colSpan={6} className="px-6 py-10 text-center text-sm text-slate-400">
                          검색 결과가 없습니다.
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {activeNav === "products" && <PlaceholderSection title="상품 관리" />}
          {activeNav === "posts" && <PlaceholderSection title="게시글 관리" />}
          {activeNav === "settings" && <PlaceholderSection title="설정" />}
        </div>
      </main>

      {modalUser !== null && (
        <UserModal user={modalUser.id ? modalUser : null} onClose={() => setModalUser(null)} onSave={handleSaveUser} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminDashboard />);
</script>
</body>
</html>
