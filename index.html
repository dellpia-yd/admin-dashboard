      '오류 발생:\n' + (e.message || '') + '\n' +

                      <button onClick={() => { setModal(p); setOpenMenuId(null); }}
                        className="block w-full px-4 py-2 text-left text-sm text-slate-600 hover:bg-slate-50">수정</button>
                      <button onClick={() => { onDelete(p.id); setOpenMenuId(null); }}
                        className="block w-full px-4 py-2 text-left text-sm text-rose-500 hover:bg-rose-50">삭제</button>
                    </div>
                  )}
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={5} className="px-6 py-10 text-center text-sm text-slate-400">
                {posts.length === 0 ? "등록된 게시글이 없습니다." : "검색 결과가 없습니다."}
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
      {modal !== null && (
        <PostModal post={modal.id ? modal : null} onClose={() => setModal(null)}
          onSave={(form) => { onSave(form); setModal(null); }} />
      )}
    </div>
  );
}

function formatWon(n) {
  return "₩" + n.toLocaleString("ko-KR");
}

function exportLedgerCSV(transactions) {
  if (!transactions || transactions.length === 0) {
    alert("내보낼 내역이 없어요.");
    return;
  }
  const header = ["날짜", "구분", "분류", "메모", "금액"];
  const rows = transactions.map((t) => [t.date, t.type, t.category, t.memo || "", t.amount]);
  const escapeCell = (v) => {
    const s = String(v ?? "");
    if (s.includes(",") || s.includes('"') || s.includes("\n")) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };
  const csv = [header, ...rows].map((row) => row.map(escapeCell).join(",")).join("\n");
  // 엑셀에서 한글이 깨지지 않도록 BOM 추가
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  const today = new Date().toISOString().slice(0, 10);
  link.href = url;
  link.download = `가계부_${today}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function BudgetSection({ budgets, transactions, onSave, onDelete }) {
  const [modalItem, setModalItem] = useState(null); // null=닫힘, {}=새항목, budget=수정

  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, "0");
  const thisMonth = `${yyyy}-${mm}`;

  const monthlyExpenses = {};
  transactions
    .filter((t) => t.type === "지출" && t.date.slice(0, 7) === thisMonth)
    .forEach((t) => {
      monthlyExpenses[t.category] = (monthlyExpenses[t.category] || 0) + t.amount;
    });

  return (
    <div className="rounded-2xl bg-white shadow-sm ring-1 ring-slate-100">
      <div className="flex items-center justify-between px-6 py-4">
        <div>

        <button
          onClick={() => setModalItem({})}
          className="flex items-center justify-center gap-1.5 rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white hover:bg-indigo-700"

        {budgets.length === 0 && (
          <div className="py-8 text-center text-sm text-slate-400">설정된 예산이 없습니다.</div>
        )}
        {budgets.map((b) => {
          const spent = monthlyExpenses[b.category] || 0;
          const pct = Math.min(100, Math.round((spent / b.amount) * 100));
          const isOver = spent > b.amount;
          return (
            <div key={b.id} className="py-3">
              <div className="flex items-center justify-between mb-1">
                <span className="text-sm font-medium text-slate-700">{b.category}</span>
                <div className="flex items-center gap-2 text-xs">
                  <span className={isOver ? "font-semibold text-rose-500" : "text-slate-500"}>
                    {formatWon(spent)}
                  </span>
                  <span className="text-slate-300">/</span>
                  <span className="text-slate-400">{formatWon(b.amount)}</span>
                  <button
                    onClick={() => setModalItem(b)}
                    className="ml-1 rounded px-1.5 py-0.5 text-slate-400 hover:bg-slate-100"
                  >수정</button>
                  <button
                    onClick={() => onDelete(b.id)}
                    className="rounded px-1.5 py-0.5 text-slate-400 hover:bg-rose-50 hover:text-rose-500"
                  >삭제</button>
                </div>
              </div>
              <div className="h-2 w-full rounded-full bg-slate-100">
                <div
                  className={`h-2 rounded-full transition-all ${isOver ? "bg-rose-400" : pct >= 80 ? "bg-amber-400" : "bg-emerald-400"}`}
                  style={{ width: `${pct}%` }}
                />
              </div>
              <div className="mt-0.5 text-right text-xs text-slate-400">
                {isOver ? (
                  <span className="text-rose-500">한도 초과 {formatWon(spent - b.amount)}</span>
                ) : (
                  <span>남은 예산 {formatWon(b.amount - spent)}</span>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {modalItem !== null && (
        <BudgetModal
          existing={modalItem.id ? modalItem : null}
          onClose={() => setModalItem(null)}
          onSave={(form) => { onSave(form); setModalItem(null); }}
        />
      )}

  );
}

// ----------------------------------------------------------------------------
// 가계부: 월별 수입/지출 차트 (Chart.js)
// ----------------------------------------------------------------------------
function LedgerChart({ transactions }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    const months = {};
    transactions.forEach((t) => {
      const m = t.date.slice(0, 7); // YYYY-MM
      if (!months[m]) months[m] = { income: 0, expense: 0 };
      if (t.type === "수입") months[m].income += t.amount;
      else months[m].expense += t.amount;
    });
    const labels = Object.keys(months).sort();
    const incomeData = labels.map((m) => months[m].income);
    const expenseData = labels.map((m) => months[m].expense);

    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(canvasRef.current, {
      type: "bar",
      data: {
        labels: labels.map((m) => m.slice(5) + "월"),
        datasets: [
          { label: "수입", data: incomeData, backgroundColor: "#34d399", borderRadius: 6 },
          { label: "지출", data: expenseData, backgroundColor: "#fb7185", borderRadius: 6 },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: "bottom", labels: { boxWidth: 12, font: { size: 11 } } },
        },
        scales: {
          y: {
            ticks: {
              callback: (v) => (v >= 1000000 ? v / 1000000 + "M" : v >= 1000 ? v / 1000 + "K" : v),
              font: { size: 11 },
            },
          },
          x: { ticks: { font: { size: 11 } } },
        },
      },
    });

    return () => {
      if (chartRef.current) chartRef.current.destroy();
    };
  }, [transactions]);

  );
}

// ----------------------------------------------------------------------------
// 가계부: 카테고리별 지출 도넛 차트 (Chart.js)
// ----------------------------------------------------------------------------
const CATEGORY_COLORS = [
  "#6366f1", "#fb7185", "#34d399", "#fbbf24", "#38bdf8", "#a78bfa", "#f472b6", "#94a3b8",
];

function CategoryChart({ transactions }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  const expenses = transactions.filter((t) => t.type === "지출");
  const totals = {};
  expenses.forEach((t) => {
    totals[t.category] = (totals[t.category] || 0) + t.amount;
  });
  const labels = Object.keys(totals).sort((a, b) => totals[b] - totals[a]);
  const values = labels.map((l) => totals[l]);
  const total = values.reduce((a, b) => a + b, 0);

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    if (labels.length === 0) return;

    chartRef.current = new Chart(canvasRef.current, {
      type: "doughnut",
      data: {
        labels,
        datasets: [
          {
            data: values,
            backgroundColor: labels.map((_, i) => CATEGORY_COLORS[i % CATEGORY_COLORS.length]),
            borderWidth: 0,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: "62%",
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => {
                const pct = total ? Math.round((ctx.parsed / total) * 100) : 0;
                return `${ctx.label}: ${formatWon(ctx.parsed)} (${pct}%)`;
              },
            },
          },
        },
      },
    });

    return () => {
      if (chartRef.current) chartRef.current.destroy();
    };
  }, [transactions]);

  if (labels.length === 0) {
    return (
      <div className="flex h-64 items-center justify-center text-sm text-slate-400">
        해당 기간의 지출 내역이 없습니다.
      </div>
    );
  }

  return (
    <div className="flex flex-col gap-4 sm:flex-row sm:items-center">
      <div className="h-56 w-56 shrink-0 mx-auto">
        <canvas ref={canvasRef} />
      </div>
      <div className="flex-1 space-y-2">
        {labels.map((label, i) => {
          const pct = total ? Math.round((totals[label] / total) * 100) : 0;
          return (
            <div key={label} className="flex items-center justify-between text-sm">
              <div className="flex items-center gap-2">
                <span
                  className="h-2.5 w-2.5 rounded-full"
                  style={{ backgroundColor: CATEGORY_COLORS[i % CATEGORY_COLORS.length] }}
                />
                <span className="text-slate-600">{label}</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-slate-400">{pct}%</span>
                <span className="font-medium text-slate-700">{formatWon(totals[label])}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const [rangeEnd, setRangeEnd] = useState("");

  const availableMonths = Array.from(new Set(transactions.map((t) => t.date.slice(0, 7)))).sort().reverse();

  let filtered = transactions;
  if (filterType === "year" && filterYear) {
    filtered = transactions.filter((t) => t.date.slice(0, 4) === filterYear);
  } else if (filterType === "month" && filterMonth) {
    filtered = transactions.filter((t) => t.date.slice(0, 7) === filterMonth);
  } else if (filterType === "range" && (rangeStart || rangeEnd)) {
    filtered = transactions.filter((t) => {
      if (rangeStart && t.date < rangeStart) return false;
      if (rangeEnd && t.date > rangeEnd) return false;
      return true;
    });
  }

  const totalIncome = filtered.filter((t) => t.type === "수입").reduce((s, t) => s + t.amount, 0);
  const totalExpense = filtered.filter((t) => t.type === "지출").reduce((s, t) => s + t.amount, 0);

  const sorted = [...filtered].sort((a, b) => (a.date < b.date ? 1 : -1));

      {/* 기간 필터 */}

              <option key={y} value={y}>
                {y}년
              </option>
            ))}
          </select>

        {filterType === "month" && (
          <select
            value={filterMonth}

          >

              <option key={m} value={m}>
                {m.slice(0, 4)}년 {m.slice(5)}월

            ))}
          </select>
        )}

        {filterType === "range" && (

            >
              CSV 내보내기

            <button
              onClick={() => setModalOpen(true)}
              className="flex items-center justify-center gap-1.5 rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white hover:bg-indigo-700"
            >
              + 내역 추가
            </button>
          </div>
        </div>

        <div className="overflow-x-auto">
          <table className="w-full text-left text-sm">
            <thead>
              <tr className="border-y border-slate-100 text-xs uppercase tracking-wide text-slate-400">
                <th className="px-6 py-3 font-medium">날짜</th>
                <th className="px-6 py-3 font-medium">구분</th>

                    {t.type === "수입" ? "+" : "-"}

                  <td className="px-6 py-3 text-right">
                    <button
                      onClick={() => onDelete(t.id)}

                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      {/* 카테고리별 예산 */}
      <BudgetSection budgets={budgets} transactions={transactions} onSave={onSaveBudget} onDelete={onDeleteBudget} />

      {/* 고정 지출 / 수입 */}
      <RecurringSection items={recurringItems} onAdd={onAddRecurring} onDelete={onDeleteRecurring} />

      {modalOpen && (
        <LedgerModal
          onClose={() => setModalOpen(false)}
          onSave={(form) => {
            onAdd(form);
            setModalOpen(false);
          }}
        />
      )}
    </div>
  );
}

      setUsersLoading(false);
    };

        .from("ledger")

        .from("recurring_items")

        .eq("active", true)
        .order("day_of_month", { ascending: true });

    };

  }, []);

  useEffect(() => {
    if (ledgerLoading || recurring.length === 0) return;

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const currentDay = today.getDate();

    const toAdd = recurring.filter((item) => {
      if (currentDay < item.day_of_month) return false;
      const alreadyExists = ledger.some(
        (t) => t.recurring_id === item.id && t.date.slice(0, 7) === `${yyyy}-${mm}`
      );
      return !alreadyExists;
    });

    if (toAdd.length === 0) return;

    const insertAll = async () => {
      const entries = toAdd.map((item) => {
        const day = String(Math.min(item.day_of_month, 28)).padStart(2, "0");
        return {
          type: item.type,
          category: item.category,
          amount: item.amount,
          date: `${yyyy}-${mm}-${day}`,
          memo: item.memo,
          recurring_id: item.id,

    if (!error) setPosts((prev) => prev.filter((p) => p.id !== id));
    else alert("삭제 중 오류: " + error.message);
  };

  return (
    <div className="flex h-screen w-full bg-slate-50 text-slate-800">
      {/* 사이드바 */}
      <aside className={`fixed inset-y-0 left-0 z-40 flex w-60 shrink-0 flex-col border-r border-slate-200 bg-white transition-transform md:relative md:translate-x-0 ${sidebarOpen ? "translate-x-0" : "-translate-x-full"}`}>
        <div className="flex items-center gap-2 px-6 py-5">
          <div className="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 text-sm font-bold text-white">
            A
          </div>
          <span className="text-lg font-bold text-slate-800">Admin</span>
        </div>

        <nav className="mt-2 flex-1 space-y-1 px-3">
          {navItems.map((item) => {
            const isActive = activeNav === item.id;
            return (
              <button
                key={item.id}
                onClick={() => { setActiveNav(item.id); setSidebarOpen(false); }}
                className={`flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition-colors ${
                  isActive
                    ? "bg-indigo-50 text-indigo-600"
                    : "text-slate-500 hover:bg-slate-50 hover:text-slate-700"
                }`}
              >
                <span className="text-base">{item.icon}</span>
                {item.label}
              </button>
            );
          })}
        </nav>

        <div className="border-t border-slate-100 px-4 py-4">
          <div className="flex items-center gap-3 rounded-xl bg-slate-50 px-3 py-2.5">
            <div className="flex h-9 w-9 items-center justify-center rounded-full bg-slate-200 text-sm font-semibold text-slate-600">
              관
            </div>
            <div className="leading-tight flex-1">
              <p className="text-sm font-semibold text-slate-700">관리자</p>
              <p className="text-xs text-slate-400">admin@example.com</p>
            </div>
            <button
              onClick={onLogout}
              className="rounded-lg px-2 py-1 text-xs text-slate-400 hover:bg-slate-200 hover:text-slate-600"
              title="로그아웃"
            >
              로그아웃
            </button>
          </div>
        </div>
      </aside>

      {sidebarOpen && (
        <div onClick={() => setSidebarOpen(false)} className="fixed inset-0 z-30 bg-black/30 md:hidden" />
      )}

      {/* 메인 영역 */}
      <main className="flex-1 overflow-y-auto">
        <header className="flex items-center justify-between border-b border-slate-200 bg-white px-4 py-4 md:px-8">
          <div className="flex items-center gap-3">
            <button onClick={() => setSidebarOpen(true)} className="rounded-lg p-1.5 text-slate-500 hover:bg-slate-100 md:hidden">
              ☰
            </button>
            <h1 className="text-xl font-bold text-slate-800">
              {navItems.find((n) => n.id === activeNav)?.label}
            </h1>
          </div>
          <div className="relative hidden sm:block">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
            <input
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="검색..."
              className="w-64 rounded-lg border border-slate-200 bg-slate-50 px-9 py-2 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
            />
          </div>
        </header>

        <div className="p-4 md:p-8">
          {activeNav === "dashboard" && (
            <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
              {statCards.map((card) => (
                <div key={card.label} className="rounded-2xl bg-white p-5 shadow-sm ring-1 ring-slate-100">
                  <div className={`mb-3 h-1.5 w-10 rounded-full ${card.accent}`} />
                  <p className="text-sm text-slate-400">{card.label}</p>
                  <p className="mt-1 text-2xl font-bold text-slate-800">{card.value}</p>
                  <p className="mt-1 text-xs font-medium text-emerald-500">{card.delta}</p>
                </div>
              ))}

              <div className="col-span-full mt-2 rounded-2xl bg-white p-6 text-sm text-slate-400 shadow-sm ring-1 ring-slate-100">
                여기에 차트, 최근 활동 로그, 알림 등을 추가할 수 있어요. 왼쪽 메뉴에서 "회원 관리"를
                눌러 실제 데이터 테이블 예시를 확인해보세요.
              </div>
            </div>
          )}

          {activeNav === "users" && (
            usersLoading ? (
              <div className="flex items-center justify-center rounded-2xl bg-white py-24 text-sm text-slate-400 shadow-sm ring-1 ring-slate-100">불러오는 중...</div>
            ) : (
            <div className="rounded-2xl bg-white shadow-sm ring-1 ring-slate-100">
              <div className="flex flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-6">
                <div className="relative sm:hidden">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                  <input
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    placeholder="검색..."
                    className="w-full rounded-lg border border-slate-200 bg-slate-50 px-9 py-2 text-sm outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
                  />
                </div>
                <p className="text-sm text-slate-400">총 {filteredUsers.length}명</p>
                <button
                  onClick={() => setModalUser({})}
                  className="flex items-center justify-center gap-1.5 rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white hover:bg-indigo-700"
                >
                  + 회원 추가
                </button>
              </div>

              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm">
                  <thead>
                    <tr className="border-y border-slate-100 text-xs uppercase tracking-wide text-slate-400">
                      <th className="px-6 py-3 font-medium">이름</th>
                      <th className="px-6 py-3 font-medium">이메일</th>
                      <th className="px-6 py-3 font-medium">역할</th>
                      <th className="px-6 py-3 font-medium">상태</th>
                      <th className="px-6 py-3 font-medium">가입일</th>
                      <th className="px-6 py-3 font-medium text-right">관리</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredUsers.map((u) => (
                      <tr key={u.id} className="border-b border-slate-50 last:border-0 hover:bg-slate-50/60">
                        <td className="px-6 py-3 font-medium text-slate-700">{u.name}</td>
                        <td className="px-6 py-3 text-slate-500">{u.email}</td>
                        <td className="px-6 py-3 text-slate-500">{u.role}</td>
                        <td className="px-6 py-3">
                          <span
                            className={`rounded-full px-2.5 py-1 text-xs font-medium ${
                              u.status === "활성"
                                ? "bg-emerald-50 text-emerald-600"
                                : "bg-rose-50 text-rose-500"
                            }`}
                          >
                            {u.status}
                          </span>
                        </td>
                        <td className="px-6 py-3 text-slate-500">{u.joined}</td>
                        <td className="relative px-6 py-3 text-right">
                          <button
                            onClick={() => setOpenMenuId(openMenuId === u.id ? null : u.id)}
                            className="rounded-lg p-1.5 text-slate-400 hover:bg-slate-100"
                          >
                            ⋮
                          </button>
                          {openMenuId === u.id && (
                            <div className="absolute right-6 top-10 z-10 w-32 rounded-xl border border-slate-100 bg-white py-1 shadow-lg">
                              <button
                                onClick={() => {
                                  setModalUser(u);
                                  setOpenMenuId(null);
                                }}
                                className="block w-full px-4 py-2 text-left text-sm text-slate-600 hover:bg-slate-50"
                              >
                                수정
                              </button>
                              <button
                                onClick={() => handleDeleteUser(u.id)}
                                className="block w-full px-4 py-2 text-left text-sm text-rose-500 hover:bg-rose-50"
                              >
                                삭제
                              </button>
                            </div>
                          )}
                        </td>
                      </tr>
                    ))}
                    {filteredUsers.length === 0 && (
                      <tr>
                        <td colSpan={6} className="px-6 py-10 text-center text-sm text-slate-400">
                          검색 결과가 없습니다.
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
            )
          )}

          {activeNav === "products" && (
            <ProductSection products={products} loading={productsLoading} onSave={handleSaveProduct} onDelete={handleDeleteProduct} />
          )}
          {activeNav === "posts" && (
            <PostSection posts={posts} loading={postsLoading} onSave={handleSavePost} onDelete={handleDeletePost} />
          )}
          {activeNav === "ledger" && (
            ledgerLoading ? (
              <div className="flex items-center justify-center rounded-2xl bg-white py-24 text-sm text-slate-400 shadow-sm ring-1 ring-slate-100">
                불러오는 중...
              </div>
            ) : (
              <LedgerSection
                transactions={ledger}
                onAdd={handleAddLedger}
                onDelete={handleDeleteLedger}
                recurringItems={recurring}
                onAddRecurring={handleAddRecurring}
                onDeleteRecurring={handleDeleteRecurring}
                budgets={budgets}
                onSaveBudget={handleSaveBudget}
                onDeleteBudget={handleDeleteBudget}
              />
            )
          )}
          {activeNav === "settings" && <PlaceholderSection title="설정" />}
        </div>
      </main>

      {modalUser !== null && (
        <UserModal user={modalUser.id ? modalUser : null} onClose={() => setModalUser(null)} onSave={handleSaveUser} />
      )}
    </div>
  );
}

// ----------------------------------------------------------------------------
// 로그인 화면
// ----------------------------------------------------------------------------
function LoginPage({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const handleLogin = async () => {
    if (!email || !password) { setError("이메일과 비밀번호를 입력해주세요."); return; }
    setLoading(true);
    setError("");
    const { data, error: err } = await supabase.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (err) {
      setError("이메일 또는 비밀번호가 올바르지 않아요.");
    } else {
      onLogin(data.session);
    }
  };

  return (
    <div className="flex min-h-screen items-center justify-center bg-slate-50 p-4">
      <div className="w-full max-w-sm rounded-2xl bg-white p-8 shadow-xl ring-1 ring-slate-100">
        <div className="mb-8 flex flex-col items-center">
          <div className="flex h-12 w-12 items-center justify-center rounded-xl bg-indigo-600 text-xl font-bold text-white mb-3">A</div>
          <h1 className="text-xl font-bold text-slate-800">관리자 로그인</h1>
          <p className="mt-1 text-sm text-slate-400">Admin Dashboard</p>
        </div>

        <div className="space-y-4">
          <div>
            <label className="mb-1 block text-xs font-medium text-slate-500">이메일</label>
            <input
              type="email"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && handleLogin()}
              placeholder="admin@example.com"
              className="w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm text-slate-700 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
            />
          </div>
          <div>
            <label className="mb-1 block text-xs font-medium text-slate-500">비밀번호</label>
            <input
              type="password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && handleLogin()}
              placeholder="••••••••"
              className="w-full rounded-lg border border-slate-200 px-3 py-2.5 text-sm text-slate-700 outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
            />
          </div>

          {error && (
            <p className="rounded-lg bg-rose-50 px-3 py-2 text-xs font-medium text-rose-500">{error}</p>
          )}

          <button
            onClick={handleLogin}
            disabled={loading}
            className="w-full rounded-lg bg-indigo-600 py-2.5 text-sm font-medium text-white hover:bg-indigo-700 disabled:opacity-60"
          >
            {loading ? "로그인 중..." : "로그인"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ----------------------------------------------------------------------------
// 앱 루트 (로그인 상태 관리)
// ----------------------------------------------------------------------------
function App() {
  const [session, setSession] = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setChecking(false);
    });
    const { data: listener } = supabase.auth.onAuthStateChange((_event, s) => {
      setSession(s);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  if (checking) return (
    <div className="flex min-h-screen items-center justify-center bg-slate-50 text-sm text-slate-400">
      로딩 중...
    </div>
  );

  if (!session) return <LoginPage onLogin={setSession} />;

  return <AdminDashboard onLogout={() => supabase.auth.signOut()} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
} catch (err) {
  document.getElementById("root").innerHTML =
    '<div style="padding:20px;font-family:monospace;color:#b91c1c;white-space:pre-wrap;font-size:12px;line-height:1.6;">' +
    '오류 발생 (코드):\n' +
    (err && err.message ? err.message : String(err)) + '\n\n' +
    (err && err.stack ? err.stack : '') +
    '</div>';
}
</script>
</body>
</html>
